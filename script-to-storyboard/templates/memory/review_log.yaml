# Review Log Template
# Initialize for new projects

# ─────────────────────────────────────────
# 限制策略
# ─────────────────────────────────────────
limits:
  max_entries: 100          # 保留最近 100 条审查记录
  max_repeated_issues: 20   # 保留最近 20 个重复问题

entries: []

issue_patterns: []

quality_trends:
  avg_score_history: []
  pass_rate_history: []

