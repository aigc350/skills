# Scene States Memory Template
# Initialize for new projects

# ─────────────────────────────────────────
# 限制策略（防止无限增长）
# ─────────────────────────────────────────
limits:
  max_scenes_tracked: 50      # 保留最近 50 个场景状态
  max_character_states: 20    # 每个角色保留 20 个状态快照
  max_location_states: 20    # 每个地点保留 20 个状态

last_processed:
  chapter_id: null
  timestamp: null

scene_history: []

character_states: {}

location_states: {}

visual_consistency:
  global_tone: null
  lighting_notes: []
  color_notes: []

