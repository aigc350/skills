# Scene Breakdown Schema
# 验证 scene_breakdown agent 输出的场景拆分

type: object
required:
  - chapter_id
  - scenes
  - metadata

properties:
  chapter_id:
    type: string
    pattern: "^[A-Za-z0-9_-]+$"

  metadata:
    type: object
    required:
      - scene_count
      - total_duration
    properties:
      scene_count:
        type: integer
        minimum: 1
      total_duration:
        type: string
        pattern: "^[0-9]+-[0-9]+ 分钟$"

  scenes:
    type: array
    min_items: 1
    items:
      type: object
      required:
        - scene_id
        - location
        - time
        - characters
        - coverage_type
      properties:
        scene_id:
          type: string
          pattern: "^([0-9]+|S[0-9]+)$"
          description: "场景ID：复用 scenes 文件的 id，如 1, 2 或 S1, S2"
        location:
          type: object
          required:
            - name
            - type
          properties:
            name:
              type: string
              min_length: 1
            type:
              type: string
              enum: [INT, EXT, INT/EXT]
        time:
          type: string
          oneOf:
            - enum: [白天, 夜晚, 黎明, 黄昏, 早晨, 下午, 傍晚]
            - enum: [Day, Night, Dawn, Dusk, Morning, Afternoon, Evening]
        duration:
          type: string
          pattern: "^[0-9]+-[0-9]+ 秒$"
        characters:
          type: array
          min_items: 1
          items:
            type: object
            required:
              - name
              - emotion
            properties:
              name:
                type: string
              emotion:
                type: string
              position:
                type: string
        content_summary:
          type: string
          min_length: 10
        coverage_type:
          type: string
          enum: [Full Coverage, Minimal, Intensive, Sequential]
        visual_notes:
          type: string
        continuity_warning:
          type: string
          description: "如有连续性冲突，描述冲突内容"

# Validation rules
on_invalid: retry
error_messages:
  missing_scene_id: "每个场景必须有 scene_id，复用 scenes 文件的 id"
  missing_location: "每个场景必须有 location.name 和 location.type"
  invalid_coverage: "coverage_type 必须是：Full Coverage、Minimal、Intensive 或 Sequential"
  missing_characters: "每个场景至少有一个角色"
