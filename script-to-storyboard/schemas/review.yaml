# Storyboard Review Schema
# 验证 reviewer agent 输出的审查结果

type: object
required:
  - chapter_id
  - scores
  - issues
  - passed

properties:
  chapter_id:
    type: string
    pattern: "^[A-Za-z0-9_-]+$"

  scores:
    type: object
    required:
      - technical_feasibility
      - continuity
      - visual_storytelling
      - format_compliance
      - total
    properties:
      technical_feasibility:
        type: number
        minimum: 0
        maximum: 1
      continuity:
        type: number
        minimum: 0
        maximum: 1
      visual_storytelling:
        type: number
        minimum: 0
        maximum: 1
      format_compliance:
        type: number
        minimum: 0
        maximum: 1
      total:
        type: number
        minimum: 0
        maximum: 1

  passed:
    type: boolean
    description: "是否通过审查（总分 >= 0.85 且各维度 >= 0.85 或 总分 >= 0.85）"

  issues:
    type: array
    items:
      type: object
      required:
        - id
        - category
        - severity
        - location
        - description
        - suggestion
      properties:
        id:
          type: string
          pattern: "^ISSUE-[0-9]+$"
        category:
          type: string
          enum: [technical_impossible, continuity_error, visual_confusion, pacing_issue, format_error]
        severity:
          type: string
          enum: [high, medium, low]
        location:
          type: string
          description: "问题所在位置，如 shot_id 或 scene_id"
        description:
          type: string
          min_length: 10
        suggestion:
          type: string
          description: "修改建议"

  summary:
    type: string
    description: "总体评价"

# Validation rules
on_invalid: retry
error_messages:
  missing_scores: "必须包含所有四个维度的分数"
  total_mismatch: "总分必须等于各维度加权平均"
  missing_issue_id: "每个问题必须有 ISSUE-{序号} 格式的 ID"
  missing_suggestion: "每个问题都必须有修改建议"
