type: object

required:
  - chapter_id

properties:

  chapter_id:
    type: string
    description: "当前章节 ID"

  loaded_from:
    type: string
    description: "来源文件路径（asset_registry.yaml）"

  loaded_at:
    type: string
    description: "加载时间戳"

  # ===== 可复用资产 =====
  reusable:
    type: object

    properties:

      characters:
        type: array
        description: "可复用的角色资产"
        items:
          type: object
          required:
            - character_id
            - variants
          properties:
            character_id:
              type: string
            variants:
              type: array
              items:
                type: object
                required:
                  - variant_id
                  - asset_id
                  - source
                properties:
                  variant_id:
                    type: string
                  asset_id:
                    type: string
                  reference_image:
                    type: string
                    description: "参考图路径（如有）"
                  appearance_fingerprint:
                    type: array
                    items:
                      type: string
                  generation_status:
                    type: string
                    enum: [approved, generating]
                  source:
                    type: string
                    enum: [reused, derived]
                    description: "reused=完全复用，derived=派生变体"

      locations:
        type: array
        description: "可复用的场景资产"
        items:
          type: object
          required:
            - location_id
            - variants
          properties:
            location_id:
              type: string
            variants:
              type: array
              items:
                type: object
                required:
                  - variant_id
                  - asset_id
                properties:
                  variant_id:
                    type: string
                  asset_id:
                    type: string
                  reference_image:
                    type: string
                  anchors:
                    type: array
                    items:
                      type: string
                  generation_status:
                    type: string
                    enum: [approved, generating]

      objects:
        type: array
        description: "可复用的物品资产"
        items:
          type: object
          required:
            - object_id
            - variants
          properties:
            object_id:
              type: string
            variants:
              type: array
              items:
                type: object
                required:
                  - variant_id
                  - asset_id
                properties:
                  variant_id:
                    type: string
                  asset_id:
                    type: string
                  state:
                    type: string
                    description: "物品状态（intact/broken 等）"
                  generation_status:
                    type: string
                    enum: [approved, generating]

  # ===== 需要新建的资产 =====
  new_needed:
    type: object

    properties:

      characters:
        type: array
        items:
          type: object
          required:
            - character_id
            - reason
          properties:
            character_id:
              type: string
            variant_id:
              type: string
            reason:
              type: string
              description: "新建原因（首次出场/新服装等）"

      locations:
        type: array
        items:
          type: object
          required:
            - location_id
            - reason
          properties:
            location_id:
              type: string
            variant_id:
              type: string
            reason:
              type: string

      objects:
        type: array
        items:
          type: object
          required:
            - object_id
            - reason
          properties:
            object_id:
              type: string
            reason:
              type: string
              description: "新建原因（首次出现/状态变化等）"
