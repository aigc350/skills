type: object

required:
  - chapter_id
  - meta
  - shots

properties:

  chapter_id:
    type: string
    description: "章节 ID"

  meta:
    type: object
    required: [enhanced, genre, intensity]
    properties:
      enhanced:
        type: boolean
      genre:
        type: string
        description: "从 canonical.style 揥取的风格类型"
      intensity:
        type: string
        description: "从 canonical.style 揨 取的强度"
      boost_factor:
        type: number

  shots:
    type: array

    items:
      type: object

      required:
        - shot_id
        - prompt
        - enhancement

      properties:

        shot_id:
          type: string

        # 继承 canonical 的完整 prompt 结构（不修改）
        prompt:
          $ref: "common.schema.yaml#/Prompt"

        # 本阶段新增的增强数据
        enhancement:
          type: object

          required: [style_tags]

          properties:

            style_tags:
              type: array
              items:
                type: string
              description: "增强关键词汇总"

            hook:
              type: object
              properties:
                type:
                  type: string
                  description: "opening / middle / climax"
                prefix:
                  type: array
                  items:
                    type: string
                suffix:
                  type: array
                  items:
                    type: string

            emotion:
              type: object
              properties:
                keywords:
                  type: array
                  items:
                    type: string

            camera:
              type: object
              properties:
                keywords:
                  type: array
                  items:
                    type: string

            lighting:
              type: object
              properties:
                keywords:
                  type: array
                  items:
                    type: string

            environment:
              type: object
              properties:
                keywords:
                  type: array
                  items:
                    type: string

            # 爽点结构化（供 Resolver 使用）
            hook_type:
              type: string
            opening_beat:
              type: string
            payoff_target:
              type: array
              items:
                type: string
            emphasis:
              type: array
              items:
                type: string