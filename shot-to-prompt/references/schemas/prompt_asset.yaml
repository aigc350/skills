type: object

required:
  - characters
  - locations
  - props

properties:

  characters:
    type: array
    items:
      allOf:
        - $ref: "common.schema.yaml#/AssetBase"
        - type: object
          required: [character_id]
          properties:
            character_id:
              type: string

  locations:
    type: array
    items:
      $ref: "common.schema.yaml#/AssetBase"

  props:
    type: array
    items:
      $ref: "common.schema.yaml#/AssetBase"