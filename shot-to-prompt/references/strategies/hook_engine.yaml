# 🎯 Selection Rules（供 enhancer 使用）

rules:

position_detection:
opening: shot_index == 0
climax: shot_index == last
middle: otherwise

intensity_mapping:
high:
- use "high"
- allow multiple phrases (1~2)
medium:
- use "medium"
- pick 1 phrase
low:
- use "low"
- optional usage

injection_strategy:
opening:
- prepend to prompt
middle:
- append lightly
climax:
- append + emphasize

---

# 🧩 Output Contract

返回：

```yaml
hook_result:
  phrases: [string]
  position: opening | middle | climax
  intensity: low | medium | high
```

---

# 🚫 Constraints

❌ 不生成完整句子
❌ 不修改原 prompt 结构
❌ 不涉及模型适配

---

# 🚀 Usage Flow

```text
IR → enhancer → hook_engine → 返回 phrases → 注入 prompt
```

---
