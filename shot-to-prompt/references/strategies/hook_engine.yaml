# Hook Engine Template Library v1.0

## 🧠 Role

提供“爆点模板库”，供 prompt_enhancer 调用。

---

## ⚙️ Design Principles

* 按 **genre（题材）** 分类
* 按 **scene_position（镜头位置）** 分类
* 支持 **intensity（强度分级）**
* 输出为 **可插入 prompt 的短语（phrases）**

---

## 📦 Schema

```yaml
hooks:
  <genre>:
    <position>:
      low: []
      medium: []
      high: []
```

---

