type: object

required:
  - shots

properties:

  shots:
    type: array

    items:
      type: object

      required:
        - shot_id
        - final_prompt

      properties:

        shot_id:
          type: string

        final_prompt:
          type: string

        negative_prompt:
          type: string

        referenced_assets:
          type: array
          items:
            type: string

        resolver_trace:
          type: object

          properties:

            canonical:
              type: boolean

            enhancer:
              type: boolean

            asset:
              type: boolean

            consistency:
              type: boolean

            temporal:
              type: boolean