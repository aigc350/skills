# Shot-to-Prompt Pipeline v2.1
# v0.5 架构：合并 load_assets → asset_builder, select_platform → resolver
# v0.5 修正：Consistency 在 Temporal 之前（fingerprint 修复优先于 drift detection）

version: 2.0

variables:
  chapter_name: "${input.chapter_name}"
  chapter_id: "${input.chapter_id}"
  novel_id: "${config.current_novel_id}"
  shot_dir: "novels/${novel_id}/output/shot"
  prompt_dir: "novels/${novel_id}/prompt"
  memory_dir: "novels/${novel_id}/prompt/memory"
  runtime_dir: "novels/${novel_id}/prompt/runtime/${chapter_id}"
  output_dir: "novels/${novel_id}/output/prompt/${chapter_id}"

steps:
  # =========================================
  # 阶段 0：初始化
  # =========================================
  - id: check_config
    description: 检查配置文件

  - id: ensure_directories
    description: 创建目录结构

  - id: detect_shot_specs
    description: 检测章节是否已处理（检查 output_dir 是否存在最终输出），未处理则处理该章节所有 shot
    output: ${memory_dir}/pending_shot_specs.yaml

  # =========================================
  # 阶段 1：IR 构建
  # =========================================
  - id: ir_builder
    agent: prompt_ir_builder
    description: 将 shot_spec + characters + scenes 编译为统一语义 IR
    input:
      - ${shot_dir}/${chapter_id}/shot_spec.yaml
      - ${shot_dir}/${chapter_id}/characters.yaml
      - ${shot_dir}/${chapter_id}/locations.yaml
    output:
      - ${runtime_dir}/prompt_ir.yaml

  # =========================================
  # 阶段 2-3：Canonical + Enhancer
  # =========================================

  # Step 2: Canonical - 将 IR 规范化为结构化 Prompt
  - id: prompt_canonical
    agent: prompt_canonical_builder
    description: 将 prompt_ir 规范化为 canonical prompt
    input:
      - ${runtime_dir}/prompt_ir.yaml
    output:
      - ${runtime_dir}/prompt_canonical.yaml

  # Step 3: Enhancer - 策略增强（hook 爆点策略）
  - id: prompt_enhancer
    agent: prompt_enhancer
    description: 注入爆点策略增强（只读 canonical，不读 IR）
    input:
      - ${runtime_dir}/prompt_canonical.yaml
      - references/strategies/hook_engine.yaml
    output:
      - ${runtime_dir}/prompt_enhancer.yaml

  # =========================================
  # 阶段 4：Asset Builder（⭐ 内含 load_assets 逻辑：先查再建）
  # =========================================
  - id: prompt_asset
    agent: prompt_asset_builder
    description: 构建 prompt 资产库（先查询已有资产复用，再构建新资产）
    registry: ${memory_dir}/asset_registry.yaml
    input:
      - ${runtime_dir}/prompt_ir.yaml
      - ${memory_dir}/asset_registry.yaml
    output:
      - ${runtime_dir}/prompt_asset.yaml

  # =========================================
  # 阶段 5-6：Consistency → Temporal（⭐ v0.5 修正顺序）
  # Consistency 先修复 fingerprint/reference，
  # Temporal 再做 drift detection（依赖修复后的 fingerprint）
  # =========================================

  # Step 5: Consistency - 一致性校验 + 自动修复
  - id: prompt_consistency
    agent: prompt_consistency_enforcer
    description: 一致性校验 + 自动修复（ID绑定、fingerprint 补充、reference 注入）
    registry: ${memory_dir}/asset_registry.yaml
    input:
      - ${runtime_dir}/prompt_ir.yaml
      - ${runtime_dir}/prompt_asset.yaml
      - ${runtime_dir}/prompt_canonical.yaml
      - ${memory_dir}/asset_registry.yaml
    output:
      - ${runtime_dir}/prompt_consistency.yaml

  # Step 6: Temporal - 时序强制执行
  - id: prompt_temporal
    agent: prompt_temporal_enforcer
    description: 时序一致性处理（状态推进、动作结果应用、身份连续性、漂移检测）
    input:
      - ${runtime_dir}/prompt_ir.yaml
      - ${runtime_dir}/prompt_asset.yaml
      - ${runtime_dir}/prompt_consistency.yaml
    output:
      - ${runtime_dir}/prompt_temporal.yaml

  # =========================================
  # 阶段 8：Prompt Resolver（⭐ 核心模块，替代 Fusion + Adapter）
  # =========================================
  - id: prompt_resolver
    agent: prompt_resolver
    description: 融合解析 + 平台适配（双产物输出，内含平台选择）
    input:
      - ${runtime_dir}/prompt_ir.yaml
      - ${runtime_dir}/prompt_canonical.yaml
      - ${runtime_dir}/prompt_enhancer.yaml
      - ${runtime_dir}/prompt_asset.yaml
      - ${runtime_dir}/prompt_temporal.yaml
      - ${runtime_dir}/prompt_consistency.yaml
      - references/platform_mappings.yaml
      # ⭐ prompt_ir.yaml 用于 dialogue 原样照搬到 resolved_shots
      # 平台选择从 run.yaml 的 default_platform 读取
    output:
      - ${runtime_dir}/resolved_shots.yaml
      - ${runtime_dir}/final_prompts.yaml

  # =========================================
  # 阶段 9：多模态输出拆分
  # =========================================
  - id: output_splitter
    agent: output_splitter
    description: 拆分为 video/image/voice/manifest 四种输出
    input:
      - ${runtime_dir}/resolved_shots.yaml
      - ${runtime_dir}/final_prompts.yaml
      - ${memory_dir}/asset_registry.yaml
    output:
      - ${output_dir}/video_prompts.yaml
      - ${output_dir}/image_prompts.yaml
      - ${output_dir}/voice_prompts.yaml
      - ${output_dir}/asset_manifest.yaml
    # ⭐ 同时更新 asset_registry 的 used_in_chapters/used_in_shots


# =========================================
# 平台配置
# =========================================
platforms:
  sora:
    enabled: true
    default_duration: 10
    max_prompt_length: 400
    supports_long_video: true

  runway:
    enabled: true
    default_duration: 5
    max_prompt_length: 300
    supports_camera_control: true

  pika:
    enabled: true
    default_duration: 3
    max_prompt_length: 200
    fast_generation: true

  kling:
    enabled: true
    default_duration: 5
    max_prompt_length: 250
    chinese_support: true

  hailuo:
    enabled: true
    default_duration: 4
    max_prompt_length: 200
    fast_generation: true

# =========================================
# 默认配置
# =========================================
default_platform: hailuo
output_format: yaml
