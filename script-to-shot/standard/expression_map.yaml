# Expression Mapping - 表情定义（唯一标准源）
# 说明：
# - desc_en：用于 prompt 生成
# - intensity_default：默认表演强度（low / medium / high）
# - 不包含 emotion（避免耦合）

expression_map:

  # ========================
  # 基础
  # ========================
  neutral_face:
    desc_cn: "中性表情"
    desc_en: "neutral relaxed face, no visible emotion"
    intensity_default: "low"

  blank_expression:
    desc_cn: "无表情"
    desc_en: "blank expression, emotionless face"
    intensity_default: "low"

  composed_face:
    desc_cn: "冷静克制"
    desc_en: "calm controlled face, steady expression"
    intensity_default: "low"

  # ========================
  # 微笑类
  # ========================
  subtle_smirk:
    desc_cn: "轻微冷笑"
    desc_en: "subtle smirk, slight upward curve of lips"
    intensity_default: "low"

  smirk:
    desc_cn: "自信冷笑"
    desc_en: "confident smirk"
    intensity_default: "medium"

  cold_smile:
    desc_cn: "冷漠微笑"
    desc_en: "emotionless smile, eyes unchanged"
    intensity_default: "medium"

  broad_smile:
    desc_cn: "露齿大笑"
    desc_en: "broad smile showing teeth"
    intensity_default: "high"

  forced_smile:
    desc_cn: "勉强的笑"
    desc_en: "forced unnatural smile"
    intensity_default: "medium"

  # ========================
  # 嘴部
  # ========================
  tight_lips:
    desc_cn: "抿嘴"
    desc_en: "lips pressed tightly"
    intensity_default: "medium"

  downturned_lips:
    desc_cn: "嘴角下垂"
    desc_en: "lips slightly downturned"
    intensity_default: "low"

  parted_lips:
    desc_cn: "微张嘴"
    desc_en: "lips slightly parted"
    intensity_default: "low"

  trembling_lips:
    desc_cn: "嘴唇颤抖"
    desc_en: "lips trembling slightly"
    intensity_default: "high"

  clenched_teeth:
    desc_cn: "咬紧牙关"
    desc_en: "clenched teeth, tight jaw"
    intensity_default: "high"

  # ========================
  # 眼部
  # ========================
  wide_eyes:
    desc_cn: "瞪大眼睛"
    desc_en: "eyes wide open"
    intensity_default: "high"

  narrowed_eyes:
    desc_cn: "眯眼"
    desc_en: "eyes slightly narrowed"
    intensity_default: "medium"

  half_closed_eyes:
    desc_cn: "半眯眼"
    desc_en: "half-closed eyes"
    intensity_default: "low"

  intense_gaze:
    desc_cn: "强烈凝视"
    desc_en: "intense focused gaze"
    intensity_default: "high"

  downward_gaze:
    desc_cn: "目光下垂"
    desc_en: "looking downward"
    intensity_default: "low"

  side_glance:
    desc_cn: "侧眼看"
    desc_en: "sideways glance"
    intensity_default: "low"

  restless_gaze:
    desc_cn: "目光游移"
    desc_en: "restless shifting gaze"
    intensity_default: "medium"

  teary_eyes:
    desc_cn: "含泪"
    desc_en: "eyes filled with tears"
    intensity_default: "high"

  # ========================
  # 眉毛 / 面部
  # ========================
  furrowed_brows:
    desc_cn: "皱眉"
    desc_en: "brows furrowed"
    intensity_default: "medium"

  raised_eyebrows:
    desc_cn: "挑眉"
    desc_en: "eyebrows raised"
    intensity_default: "medium"

  tense_face:
    desc_cn: "面部紧绷"
    desc_en: "tense facial muscles"
    intensity_default: "high"

  pale_face:
    desc_cn: "面色苍白"
    desc_en: "pale complexion"
    intensity_default: "medium"

  flushed_face:
    desc_cn: "脸微红"
    desc_en: "slightly flushed face"
    intensity_default: "medium"

  # ========================
  # 组合表达（少量）
  # ========================
  cold_stare:
    desc_cn: "冷漠凝视"
    desc_en: "cold emotionless stare, steady gaze"
    intensity_default: "high"

  disbelief_expression:
    desc_cn: "难以置信"
    desc_en: "eyes narrowed, head slightly tilted"
    intensity_default: "medium"

  contempt_expression:
    desc_cn: "轻蔑表情"
    desc_en: "one corner of mouth raised, half-closed eyes"
    intensity_default: "medium"