# Character Standard - 角色标准模板
# 用于建立角色视觉身份

characters:

  - character_id: "shen_yan"
    base:
      gender: "male"
      age_range: "25-30"
    face_id: "face_shenyan_v1"
    default_outfit: "shenyan_suit_v1"
    traits:
      - "calm"
      - "dominant"
      - "mysterious"
    outfits:
      - outfit_id: "shenyan_suit_v1"
        type: "formal"
        color: "black"
        description: "black formal suit, slightly worn"
      - outfit_id: "shenyan_casual_v1"
        type: "casual"
        color: "dark_gray"
        description: "dark gray hoodie, simple design"
    visual_keywords:
      - "low_key_lighting"
      - "sharp_features"
      - "intense_gaze"

