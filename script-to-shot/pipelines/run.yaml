# Script-to-Shot Pipeline
# 将 scenes.yaml + script.yaml 转换为 shot_spec + characters + scenes

name: convert_script_to_shot
description: 将结构化场景数据和对白数据直接转换为 shot_spec，通过 beat 驱动的镜头编译、角色解析、场景解析、连续性检查和质量审查

variables:
  chapter_name: "${input.chapter_name}"
  chapter_id: "${input.chapter_id}"
  novel_id: "${config.current_novel_id}"
  script_source_dir: "novels/${novel_id}/output/script"
  shot_dir: "novels/${novel_id}/shot"
  memory_dir: "novels/${novel_id}/shot/memory"
  runtime_dir: "novels/${novel_id}/shot/runtime/${chapter_id}"
  output_dir: "novels/${novel_id}/output/shot"

# ─────────────────────────────────────────────────────────────
# 失败恢复策略（全局默认）
# ─────────────────────────────────────────────────────────────
failure_policy:
  default:
    retry: 2
    on_fail:
      - action: log_error
        output: "${runtime_dir}/errors.log"
      - action: skip_chapter
        message: "跳过章节：发生不可恢复错误"

steps:
  # ═══════════════════════════════════════════════════════════
  # PHASE 0: 初始化 (Initialize)
  # ═══════════════════════════════════════════════════════════
  - id: check_config
    description: 检查 novel.config.md 是否存在
    action: check_file
    path: "novel.config.md"
    on_missing: create_config

  - id: create_config
    description: 创建默认配置（如果需要）
    action: create_file
    path: "novel.config.md"
    content: |
      ---
      version: "1.0"
      created: "${timestamp}"
      updated: "${timestamp}"
      ---

      # 项目配置

      current_novel_id: other_001

  - id: ensure_directories
    description: 确保项目目录结构存在
    action: ensure_dirs
    dirs:
      - "${shot_dir}/memory"
      - "${runtime_dir}"
      - "${output_dir}/${chapter_id}"
      - "${output_dir}/${chapter_id}/meta"

  - id: init_memory_files
    description: 如果记忆文件缺失，从模板初始化
    action: init_templates
    templates:
      - source: "templates/memory/character_states.yaml"
        dest: "${memory_dir}/character_states.yaml"
      - source: "templates/memory/review_log.yaml"
        dest: "${memory_dir}/review_log.yaml"

  - id: load_standards
    description: 加载标准库
    action: load_files
    files:
      - "standard/expression_map.yaml"
      - "standard/motion_map.yaml"
      - "standard/visual_intent.yaml"
      - "standard/emotion_map.yaml"
      - "standard/enum.yaml"
      - "standard/character.yaml"
      - "standard/scene.yaml"

  # ═══════════════════════════════════════════════════════════
  # PHASE 1: 检测待处理章节 (Detect Chapters)
  # ═══════════════════════════════════════════════════════════
  - id: detect_chapters
    description: 检测 output/script 中的 scenes 文件，对比 output/shot 找出未处理的
    action: check_files
    input:
      - "${script_source_dir}/scenes_*.yaml"
      - "${script_source_dir}/script_*.yaml"
      - "${output_dir}/*/shot_spec.yaml"
    output: "${runtime_dir}/pending_chapters.yaml"
    on_result:
      empty: exit
      continue: next

  # ═══════════════════════════════════════════════════════════
  # PHASE 2: Shot 构建 (Shot Building) ⭐ 核心
  # ═══════════════════════════════════════════════════════════
  - id: build_shots
    description: Beat 切分 + 镜头编译 + 对白注入
    agent: shot_builder
    input:
      - "${script_source_dir}/scenes_${chapter_name}.yaml"
      - "${script_source_dir}/script_${chapter_name}.yaml"
      - "standard/expression_map.yaml"
      - "standard/motion_map.yaml"
      - "standard/visual_intent.yaml"
      - "standard/emotion_map.yaml"
      - "standard/enum.yaml"
      - "standard/character.yaml"
      - "standard/scene.yaml"
    output: "${runtime_dir}/shot_spec_${chapter_name}.yaml"
    schema: schemas/shot_spec.yaml
    retry:
      max: 2
    on_fail:
      - action: log_error
        message: "Shot 构建失败"
        output: "${runtime_dir}/errors.log"
      - action: skip_chapter
        message: "无法继续：缺少 shot_spec"

  # ═══════════════════════════════════════════════════════════
  # PHASE 3: 资产解析 (Asset Resolution)
  # ═══════════════════════════════════════════════════════════
  - id: resolve_characters
    description: 解析角色视觉身份
    agent: character_resolver
    input:
      - "${runtime_dir}/shot_spec_${chapter_name}.yaml"
      - "standard/character.yaml"
      - "${memory_dir}/character_states.yaml"
    output: "${runtime_dir}/characters_${chapter_name}.yaml"
    schema: schemas/character_shot.yaml
    retry:
      max: 2
    on_fail:
      - action: log_error
        message: "角色解析失败"
        output: "${runtime_dir}/errors.log"
      - action: skip_chapter
        message: "无法继续：缺少角色视觉定义"

  - id: resolve_scenes
    description: 解析场景视觉定义
    agent: scene_resolver
    input:
      - "${runtime_dir}/shot_spec_${chapter_name}.yaml"
      - "standard/scene.yaml"
    output: "${runtime_dir}/scenes_${chapter_name}.yaml"
    schema: schemas/scene_shot.yaml
    retry:
      max: 2
    on_fail:
      - action: log_error
        message: "场景解析失败"
        output: "${runtime_dir}/errors.log"
      - action: skip_chapter
        message: "无法继续：缺少场景视觉定义"

  # ═══════════════════════════════════════════════════════════
  # PHASE 4: 连续性检查 (Continuity Check)
  # ═══════════════════════════════════════════════════════════
  - id: check_consistency
    description: 跨镜头一致性检查
    agent: continuity_engine
    input:
      - "${runtime_dir}/shot_spec_${chapter_name}.yaml"
      - "${runtime_dir}/characters_${chapter_name}.yaml"
      - "${runtime_dir}/scenes_${chapter_name}.yaml"
      - "schemas/consistency.yaml"
    output: "${runtime_dir}/consistency_${chapter_name}.yaml"
    retry:
      max: 2
    on_fail:
      - action: create_default
        output: "${runtime_dir}/consistency_${chapter_name}.yaml"
        value:
          chapter_id: "${chapter_id}"
          status: "warning"
          score: 0.80
          summary: "连续性检查失败，使用默认分数"
          passed: false
      - action: log_error
        message: "连续性检查失败"

  # ═══════════════════════════════════════════════════════════
  # PHASE 5: 质量审查 (Review)
  # ═══════════════════════════════════════════════════════════
  - id: review
    description: 质量审查
    input:
      - "${runtime_dir}/shot_spec_${chapter_name}.yaml"
      - "${runtime_dir}/characters_${chapter_name}.yaml"
      - "${runtime_dir}/scenes_${chapter_name}.yaml"
      - "${runtime_dir}/consistency_${chapter_name}.yaml"
    output: "${runtime_dir}/review_${chapter_name}.yaml"
    retry:
      max: 2
    on_fail:
      - action: create_default
        output: "${runtime_dir}/review_${chapter_name}.yaml"
        value:
          chapter_id: "${chapter_id}"
          total_score: 0.80
          passed: false
          summary: "审查失败，使用默认分数"
      - action: log_error
        message: "审查解析失败，使用默认分数"

  # ═══════════════════════════════════════════════════════════
  # PHASE 6: 分数检查 (Check Score & Branch)
  # ═══════════════════════════════════════════════════════════
  - id: check_score
    condition: "${review.total_score} < 0.85"
    on_true: revise
    on_false: export

  # ═══════════════════════════════════════════════════════════
  # PHASE 7: 重写 (Revise)
  # ═══════════════════════════════════════════════════════════
  - id: revise
    description: 根据 review 反馈修正 shot_spec
    agent: shot_builder
    task: revise
    input:
      - "${runtime_dir}/shot_spec_${chapter_name}.yaml"
      - "${runtime_dir}/review_${chapter_name}.yaml"
      - "${runtime_dir}/consistency_${chapter_name}.yaml"
      - "standard/expression_map.yaml"
      - "standard/motion_map.yaml"
      - "standard/visual_intent.yaml"
      - "standard/enum.yaml"
    output: "${runtime_dir}/shot_spec_v2_${chapter_name}.yaml"
    retry:
      max: 3
    on_fail:
      - action: log_error
        message: "重写失败，使用原始 shot_spec"
        output: "${runtime_dir}/errors.log"
      - action: fallback
        use: "${runtime_dir}/shot_spec_${chapter_name}.yaml"
        save_as: "${runtime_dir}/shot_spec_v2_${chapter_name}.yaml"
    next: review_v2

  - id: review_v2
    description: 重写后的二次审查
    input:
      - "${runtime_dir}/shot_spec_v2_${chapter_name}.yaml"
      - "${runtime_dir}/characters_${chapter_name}.yaml"
      - "${runtime_dir}/scenes_${chapter_name}.yaml"
      - "${runtime_dir}/consistency_${chapter_name}.yaml"
    output: "${runtime_dir}/review_v2_${chapter_name}.yaml"
    retry:
      max: 2
    on_fail:
      - action: create_default
        output: "${runtime_dir}/review_v2_${chapter_name}.yaml"
        value:
          total_score: 0.80
          passed: false
      - action: log_error
        message: "审查 v2 解析失败"

  # ═══════════════════════════════════════════════════════════
  # PHASE 8: 导出 (Export)
  # ═══════════════════════════════════════════════════════════
  - id: check_score_v2
    condition: "${review_v2.total_score} < 0.85"
    on_true: finalize_with_warning
    on_false: finalize_v2

  - id: finalize_with_warning
    description: 重写后仍未达标，使用原版并标记警告
    action: copy
    input: "${runtime_dir}/shot_spec_${chapter_name}.yaml"
    output: "${output_dir}/${chapter_id}/shot_spec.yaml"
    post_action:
      - action: append_note
        file: "${output_dir}/${chapter_id}/shot_spec.yaml"
        note: "# 警告：重写后仍未达到质量阈值 (score < 0.85)"
      - action: log_error
        message: "章节 ${chapter_name} 最终质量分数较低"
        output: "${memory_dir}/review_log.yaml"

  - id: finalize_v2
    description: 重写版通过审查
    action: copy
    input: "${runtime_dir}/shot_spec_v2_${chapter_name}.yaml"
    output: "${output_dir}/${chapter_id}/shot_spec.yaml"

  - id: export_characters
    action: copy
    input: "${runtime_dir}/characters_${chapter_name}.yaml"
    output: "${output_dir}/${chapter_id}/characters.yaml"

  - id: export_scenes
    action: copy
    input: "${runtime_dir}/scenes_${chapter_name}.yaml"
    output: "${output_dir}/${chapter_id}/scenes.yaml"

  - id: export_consistency
    action: copy
    input: "${runtime_dir}/consistency_${chapter_name}.yaml"
    output: "${output_dir}/${chapter_id}/meta/consistency.yaml"

  # ═══════════════════════════════════════════════════════════
  # PHASE 9: 更新记忆 (Update Memory)
  # ═══════════════════════════════════════════════════════════
  - id: update_character_states
    description: 更新角色视觉状态记忆
    task: update_character_states
    input:
      - "${runtime_dir}/characters_${chapter_name}.yaml"
      - "${memory_dir}/character_states.yaml"
    output: "${memory_dir}/character_states.yaml"
    retry:
      max: 2
    on_fail:
      - action: log_error
        message: "角色状态更新失败"
      - action: continue

  - id: update_review_log
    description: 更新审查历史记录
    task: update_review_log
    input:
      - "${runtime_dir}/review_${chapter_name}.yaml"
      - "${memory_dir}/review_log.yaml"
    output: "${memory_dir}/review_log.yaml"
    on_fail:
      - action: continue

  # ═══════════════════════════════════════════════════════════
  # PHASE 10: 最终输出 (Final Output)
  # ═══════════════════════════════════════════════════════════
  - id: save_output
    description: 合并完整 Shot 包
    action: merge
    input:
      - "${output_dir}/${chapter_id}/*.yaml"
      - "${output_dir}/${chapter_id}/*.md"
    output: "${output_dir}/${chapter_id}/full_shot.yaml"
    on_complete: log_success

  - id: update_full_shot
    description: 追加处理元信息
    action: append
    input: "${output_dir}/${chapter_id}/full_shot.yaml"
    content: |
      # Full Shot Package - ${chapter_id}
      chapter_id: ${chapter_id}
      processed_at: ${timestamp}
      score: ${review.total_score}
      passed: ${review.passed}
      pipeline: "script-to-shot v0.1"
      source:
        scenes: "scenes_${chapter_name}.yaml"
        script: "script_${chapter_name}.yaml"
