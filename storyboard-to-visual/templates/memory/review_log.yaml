# Review Log Template
# 质量审查历史记录

# ─────────────────────────────────────────
# 限制策略
# ─────────────────────────────────────────
limits:
  max_entries: 100                 # 保留最近 100 条审查记录
  archive_threshold: 80            # 超过80条时归档旧记录

last_processed:
  chapter_id: null
  timestamp: null

# 审查历史
review_history: []

# 审查记录结构
# - chapter_id: 章节ID
# - timestamp: 处理时间
# - total_score: 总分
# - passed: 是否通过
# - dimensions:
#     character_consistency: 角色一致性分数
#     scene_consistency: 场景一致性分数
#     camera_consistency: 摄影一致性分数
#     narrative_consistency: 叙事一致性分数
#     format_compliance: 格式合规分数
# - issues: 问题列表
# - revision_count: 重写次数

# 示例结构 (remove after initialization):
# review_history:
#   - chapter_id: "C1"
#     timestamp: "2026-03-28T10:00:00Z"
#     total_score: 0.92
#     passed: true
#     dimensions:
#       character_consistency: 0.95
#       scene_consistency: 0.90
#       camera_consistency: 0.88
#       narrative_consistency: 0.94
#       format_compliance: 0.92
#     issues:
#       - severity: "warning"
#         detail: "outfit accessories slightly different"
#     revision_count: 0
#   - chapter_id: "C2"
#     timestamp: "2026-03-28T10:15:00Z"
#     total_score: 0.87
#     passed: true
#     dimensions:
#       character_consistency: 0.85
#       scene_consistency: 0.90
#       camera_consistency: 0.85
#       narrative_consistency: 0.88
#       format_compliance: 0.87
#     issues:
#       - severity: "warning"
#         detail: "lighting transition abrupt"
#     revision_count: 1

# 统计摘要
statistics:
  total_processed: 0
  total_passed: 0
  total_failed: 0
  average_score: 0.0
  pass_rate: 0.0
