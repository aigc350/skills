# Scene Standard - 场景标准模板
# 用于建立场景视觉定义

scenes:

  - location_id: "banquet_hall"
    type: "indoor"
    scale: "large"
    environment:
      type: "luxury_venue"
      description: "grand banquet hall with crystal chandeliers"
    lighting:
      type: "warm_chandelier"
      color_temperature: "warm"
      description: "warm ambient light from chandeliers"
    props:
      - "round_table"
      - "champagne_glass"
      - "crystal_decorations"
      - "velvet_curtains"
    atmosphere:
      keywords:
        - "luxury"
        - "formal"
        - "high_society"
    visual_keywords:
      - "gold_accents"
      - "elegant"
      - "festive"

  - location_id: "coffee_shop"
    type: "indoor"
    scale: "medium"
    environment:
      type: "cafe"
      description: "modern coffee shop with warm lighting"
    lighting:
      type: "warm_ambient"
      color_temperature: "warm"
      description: "soft warm lighting from table lamps"
    props:
      - "coffee_cup"
      - "wooden_table"
      - "bookshelf"
      - "window_seat"
    atmosphere:
      keywords:
        - "cozy"
        - "intimate"
        - "modern"
    visual_keywords:
      - "warm_tones"
      - "soft_shadows"
      - "relaxed"

  - location_id: "street_night"
    type: "outdoor"
    scale: "urban"
    environment:
      type: "city_street"
      description: "night city street with neon lights"
    lighting:
      type: "neon"
      color_temperature: "mixed"
      description: "colorful neon signs, car headlights"
    props:
      - "neon_signs"
      - "cars"
      - "street_lamp"
      - "puddles"
    atmosphere:
      keywords:
        - "urban"
        - "mysterious"
        - "energetic"
    visual_keywords:
      - "high_contrast"
      - "colorful_reflections"
      - "dynamic"

  - location_id: "warehouse"
    type: "indoor"
    scale: "large"
    environment:
      type: "abandoned_warehouse"
      description: "dark abandoned warehouse with high ceilings"
    lighting:
      type: "dim_ambient"
      color_temperature: "cool"
      description: "minimal light from broken windows"
    props:
      - "wooden_crates"
      - "metal_pillars"
      - "broken_windows"
      - "dust_particles"
    atmosphere:
      keywords:
        - "abandoned"
        - "dangerous"
        - "tense"
    visual_keywords:
      - "dark_shadows"
      - "high_contrast"
      - "moody"

  - location_id: "old_residence"
    type: "indoor"
    scale: "medium"
    environment:
      type: "traditional_chinese"
      description: "traditional Chinese style residence"
    lighting:
      type: "natural_daylight"
      color_temperature: "neutral"
      description: "soft natural light through paper windows"
    props:
      - "wooden_furniture"
      - "antique_decorations"
      - "paper_lanterns"
      - "bamboo"
    atmosphere:
      keywords:
        - "traditional"
        - "serene"
        - "nostalgic"
    visual_keywords:
      - "soft_light"
      - "natural_materials"
      - "peaceful"
