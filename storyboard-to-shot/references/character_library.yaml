# Character Library Reference - 角色模板参考
# 包含常见角色类型模板

character_library:

  # 主角类型
  protagonist_mystery:
    base:
      gender: "male"
      age_range: "25-35"
    traits:
      - "mysterious"
      - "calm"
      - "confident"
    visual_keywords:
      - "low_key_lighting"
      - "sharp_features"
      - "intense_gaze"
    common_outfits:
      - type: "formal"
        color: "dark"
      - type: "casual"
        color: "dark"

  protagonist_strong_female:
    base:
      gender: "female"
      age_range: "22-30"
    traits:
      - "independent"
      - "elegant"
      - "controlled"
    visual_keywords:
      - "graceful"
      - "poised"
      - "refined"
    common_outfits:
      - type: "formal_dress"
        color: "light"
      - type: "business"
        color: "neutral"

  # 反派类型
  antagonist_arrogant_male:
    base:
      gender: "male"
      age_range: "30-45"
    traits:
      - "arrogant"
      - "crude"
      - "threatening"
    visual_keywords:
      - "over_the_top"
      - "loud"
      - "unctuous"
    common_outfits:
      - type: "formal"
        color: "flashy"

  antagonist_cold_female:
    base:
      gender: "female"
      age_range: "25-35"
    traits:
      - "cold"
      - "calculating"
      - "elegant"
    visual_keywords:
      - "ice_queen"
      - "distant"
      - "refined"
    common_outfits:
      - type: "formal_dress"
        color: "dark"

  # 支持角色类型
  supporting_loyal:
    base:
      gender: "male"
      age_range: "45-60"
    traits:
      - "loyal"
      - "respectful"
      - "experienced"
    visual_keywords:
      - "professional"
      - "dignified"
      - "reserved"
    common_outfits:
      - type: "formal"
        color: "black"

  supporting_comic:
    base:
      gender: "male"
      age_range: "20-30"
    traits:
      - "humorous"
      - "friendly"
      - "supportive"
    visual_keywords:
      - "approachable"
      - "warm"
      - "casual"
    common_outfits:
      - type: "casual"
        color: "bright"
