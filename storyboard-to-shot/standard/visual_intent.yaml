# 🎬 visual_intent.yaml（统一视觉标准库 v1.1）

version: 1.1

# =========================================

# 🎥 镜头类型（景别）

# =========================================

shot_type:
establishing: {}        # 建立镜头（环境/空间）
wide: {}                # 全景（人物+环境）
medium: {}              # 中景（腰部以上）
medium_close_up: {}     # 中近景（胸部以上）
close_up: {}            # 近景（面部）
extreme_close_up: {}    # 特写（眼睛/嘴等）
over_the_shoulder: {}   # 过肩镜头
point_of_view: {}       # 主观镜头（第一视角）
two_shot: {}            # 双人镜头
crowd: {}               # 群像镜头

# =========================================

# 📐 构图

# =========================================

composition:
centered: {}            # 居中构图
rule_of_thirds: {}      # 三分法
symmetrical: {}         # 对称
leading_lines: {}       # 引导线
frame_within_frame: {}  # 框中框
foreground_focus: {}    # 前景突出
background_focus: {}    # 背景突出
depth_layered: {}       # 多层景深
diagonal: {}            # 对角线构图
minimal: {}             # 极简构图

# =========================================

# 🎬 机位角度

# =========================================

camera_angle:
eye_level: {}           # 平视
low_angle: {}           # 仰视（强调压迫/强势）
high_angle: {}          # 俯视（弱势）
bird_eye: {}            # 鸟瞰
worm_eye: {}            # 虫视（极低角度）
dutch_tilt: {}          # 倾斜镜头（不稳定感）

# =========================================

# 🎞️ 镜头运动（已统一命名）

# =========================================

camera_movement:
static: {}              # 固定
pan: {}                 # 水平摇
tilt: {}                # 垂直摇
zoom_in: {}             # 推近（镜头变焦）
zoom_out: {}            # 拉远
dolly_in: {}            # 机位推进
dolly_out: {}           # 机位后退
tracking: {}            # 跟随
handheld: {}            # 手持（抖动）
crane: {}               # 升降镜头

# =========================================

# 💡 光线

# =========================================

lighting:
high_key: {}            # 高调光（明亮）
low_key: {}             # 低调光（强对比）
natural: {}             # 自然光
warm: {}                # 暖光
cold: {}                # 冷光
neon: {}                # 霓虹
backlight: {}           # 逆光
silhouette: {}          # 剪影
spotlight: {}           # 聚光
soft_diffused: {}       # 柔光

# =========================================

# 🌫️ 场景氛围（环境层）

# =========================================

atmosphere:
luxury: {}              # 奢华
tense: {}               # 紧张
romantic: {}            # 浪漫
mysterious: {}          # 神秘
dark: {}                # 压抑
bright: {}              # 明快
chaotic: {}             # 混乱
formal: {}              # 正式
intimate: {}            # 私密

# =========================================

# 🎭 人物情绪（内在状态）
# 说明：emotion 是角色内在的情绪/心理状态，是叙事层面的描述
#       对应的外在表情由 expression_map.yaml 定义

# =========================================

emotion:
calm: {}                # 冷静
tension: {}             # 紧张
dominance: {}           # 压制/掌控
humiliation: {}         # 羞辱
anger: {}               # 愤怒
suppressed_anger: {}    # 克制愤怒
sadness: {}             # 悲伤
shock: {}               # 震惊
fear: {}                # 恐惧
confidence: {}          # 自信

# =========================================

# 🔥 人物动作（关键补充）

# =========================================

subject_action:
idle: {}                # 静止
standing: {}            # 站立
sitting: {}             # 坐着
walking: {}             # 行走
turning: {}             # 转身

looking_at_other: {}    # 看向他人
looking_away: {}        # 移开视线

smiling: {}             # 微笑
smirking: {}            # 冷笑
frowning: {}            # 皱眉

raising_hand: {}        # 抬手
pointing: {}            # 指向

holding_object: {}      # 持物
drinking: {}            # 喝东西

confrontation_stance: {} # 对峙姿态

# =========================================

# 👁️ 视线控制（关键补充）

# =========================================

gaze:
forward: {}             # 正前
downward: {}            # 向下
upward: {}              # 向上

left: {}                # 左
right: {}               # 右

looking_at_character: {} # 看人
looking_at_object: {}    # 看物

avoiding_eye_contact: {} # 回避眼神

# =========================================

# ⏱️ 节奏控制（短剧关键）

# =========================================

pacing:
slow: {}                # 慢节奏
normal: {}              # 正常
fast: {}                # 快节奏

dramatic_pause: {}      # 戏剧停顿
rapid_cut: {}           # 快切

# =========================================

# 🎯 叙事功能（剧情层）

# =========================================

narrative_function:
establish: {}           # 建立场景
build_up: {}            # 铺垫
conflict: {}            # 冲突
climax: {}              # 高潮
reveal: {}              # 信息揭示
foreshadow: {}          # 伏笔
reaction: {}            # 反应镜头
transition: {}          # 过渡

# =========================================

# 🎨 风格

# =========================================

style:
cinematic: {}           # 电影感
realistic: {}           # 写实
stylized: {}            # 风格化
noir: {}                # 黑色电影
cyberpunk: {}           # 赛博朋克
vintage: {}             # 复古
documentary: {}         # 纪录片风
