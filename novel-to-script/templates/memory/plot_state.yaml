# Plot State Memory Template
# Initialize for new projects

# ─────────────────────────────────────────
# 限制策略（防止无限增长）
# ─────────────────────────────────────────
limits:
  max_timeline: 20            # 保留最近 20 章的时间线
  max_active_mysteries: 5     # 最多追踪 5 个活跃谜题
  max_open_loops: 10          # 最多追踪 10 个未闭合伏笔
  max_character_states: 15    # 最多追踪 15 个角色状态

current_arc: null
arc_stage: null

timeline: []

active_mysteries: []

open_loops: []

character_states: {}

