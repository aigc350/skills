# Review Log Memory Template
# Initialize for new projects

# ─────────────────────────────────────────
# 限制策略（防止无限增长）
# ─────────────────────────────────────────
limits:
  max_history: 20             # 保留最近 20 条审查记录
  max_recurring_issues: 5     # 保留最常见的 5 个问题
  max_quality_trend: 10       # 保留最近 10 集的质量趋势

history: []

patterns:
  recurring_issues: []
  quality_trend: []

