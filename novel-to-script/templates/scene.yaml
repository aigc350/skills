# ======================
# 场景模板 (Scene Template)
# ======================
# 用于提取场景的 YAML 模板
# 包含地点、时间、角色、内容层、戏剧层、制作层等结构
#
# 枚举填写规则见：enums.yaml

_meta:
  enums_ref: "./enums.yaml"

# ======================
# 场景主体
# ======================
scenes:
  chapter_id: "1"             # 章节ID
  title: "茶馆疑云"               # 章节标题

  format: "short_drama"          # 格式（枚举见 _meta.enums.format）
  style: "realism"               # 风格（枚举见 _meta.enums.style）

  scenes:

    # ----------------------
    # 场景 1
    # ----------------------
    - scene_id: "C1-S1"        # 场景ID，唯一标识

      # ======================
      # 基础信息
      # ======================

      location:
        name: "茶馆"              # 地点名称（中文可读）
        type: "INT"              # 场景类型（枚举见 _meta.enums.location_type）

      time: "DAY"                # 时间（枚举见 _meta.enums.time）

      characters:
        - name: "主角"            # 角色名称
          role: "protagonist"    # 角色类型（枚举见 _meta.enums.role）
          emotion:               # 情感状态
            type: "anxiety"      # 情感类型（枚举见 _meta.enums.emotion_type）
            label: "不安"        # 情感标签（必须等于枚举定义）
            raw: "他感觉到不对劲，神经紧绷"  # 原始描述
          first_appearance: true # 是否首次出场

      # ======================
      # 内容结构层
      # ======================

      content:

        summary: "主角进入异常安静的茶馆，察觉到潜在危险"

        key_actions:             # 关键动作
          - "推门进入"
          - "观察四周"
          - "停下脚步"

        emotional_beat:          # 情绪变化
          start:                 # 起始情绪
            type: "calm"         # 情感类型（枚举见 _meta.enums.emotion_type）
            label: "平静"         # 情感标签
            raw: "刚进入时尚未察觉异常"  # 原始描述
          end:                   # 结束情绪
            type: "anxiety"      # 情感类型（枚举见 _meta.enums.emotion_type）
            label: "不安"         # 情感标签（必须等于枚举定义）
            raw: "逐渐意识到环境不对劲"  # 原始描述

        plot_significance: "建立压抑氛围，引出冲突"  # 剧情意义

      # ======================
      # 戏剧层
      # ======================

      drama:

        scene_goal: "营造不安与压迫感"  # 场景目标

        conflict:                # 冲突设置
          type: "situational"    # 冲突类型（枚举见 _meta.enums.conflict_type）
          label: "环境冲突"     # 冲突标签（必须等于枚举定义）
          raw: "茶馆中所有人盯着主角，形成无形压力"  # 原始描述

        stakes:                  # 风险/赌注
          level: "high"          # 风险等级（枚举见 _meta.enums.stakes_level）
          raw: "主角可能陷入危险甚至无法脱身"  # 原始描述

        tone:                    # 基调
          label: "压抑"           # 基调标签
          raw: "空气凝固般安静，没有人说话"  # 原始描述

      # ======================
      # 制作层（分镜输入核心）
      # ======================

      production:

        visual_focus:            # 视觉焦点
          - "主角表情变化"
          - "周围人的凝视"
          - "空间压迫感"

        audio:                   # 音频设置
          bgm: "低沉紧张氛围"     # 背景音乐
          sfx:                   # 音效
            - "木门吱呀声"
            - "脚步声"
          silence:               # 静默时刻
            - "短暂静默"

        beats:                   # 节拍点
          - "进入"
          - "观察"
          - "异常感增强"
          - "陌生人起身"

        pacing:
          speed: "fast"          # 节奏速度（枚举见 _meta.enums.pacing）

        shot_hint:               # 分镜提示
          priority: "emotion"    # 分镜优先级（枚举见 _meta.enums.shot_priority）
          suggested_shots:       # 建议镜头（枚举见 _meta.enums.shot_type）
            - "CU"
            - "MS"
            - "OTS"

      # ======================
      # 扩展层（分离 format / style）
      # ======================

      extensions:

        format:                  # 格式扩展

          short_drama:
            cut_density: "high"  # 剪切密度
            hook_points:         # 钩子点
              - "茶馆异常安静"
              - "陌生人突然站起"

          film:
            pacing:
              speed: "slow"      # 节奏速度（枚举见 _meta.enums.pacing）
            cinematography:      # 摄影
              camera_movement:   # 镜头运动（枚举见 _meta.enums.camera_movement）
                - "static"
                - "dolly_in"

        style:                   # 风格扩展

          realism:
            lighting:
              style: "自然光"     # 灯光风格
            performance:
              acting: "克制"      # 表演风格

          noir:
            lighting:
              style: "高对比阴影"  # 灯光风格
            tone:
              label: "压抑"       # 基调

          anime:
            exaggeration: "high" # 夸张程度
            vfx:                 # 视觉特效
              - "气氛压迫感视觉化"