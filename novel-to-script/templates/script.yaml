# Script Output Template
# 用于 script_writer agent 输出的剧本格式

script:
  chapter_id: "{chapter_id}"        # 章节ID（如：C1）
  title: "{chapter_title}"          # 章节标题

  genre: "short_drama"              # 当前题材（short_drama | anime | film）

  scenes:

    - scene_id: "C{chapter_id}-S{序号}"  # 场景ID（如：C001-S1、C001-S2）

      heading:
        location: "{location_name}"   # 地点（如：茶馆）
        type: "室内 | 室外 | 内外"    # INT/EXT/INT_EXT
        time: "白天 | 夜晚 | 黎明 | 黄昏 | 早晨 | 下午 | 傍晚"  # 时间

      action: |                      # 主要视觉动作（通用描述）
        {Main visual action description}

      dialogue:                     # 对话
        - character: "{character_name}"
          line: "{dialogue_line}"

      continuation: |               # 补充（内心/过渡，可选）
        {Continuation of action or inner monologue}

      ending: |                     # 场景结尾（收束/转折/钩子）
        {Scene ending}

      # ======================
      # ⭐ 扩展层（按 genre 使用）
      # ======================
      extensions:

        # ===== 🎭 短剧专用 =====
        short_drama:

          pacing:
            speed: "fast"           # 节奏：快
            cut_density: "high"     # 剪辑密度：高

          hooks:
            start_hook: "{开头3秒钩子}"   # 吸引用户
            end_hook: "{结尾反转/悬念}"   # 提升完播率

          conflict:
            type: "人物冲突 | 情境冲突"
            intensity: "low | medium | high"

          dialogue_style:
            style: "sharp"          # 台词风格：锋利/直接
            subtext: false          # 是否有潜台词（短剧一般少）

          retention_points:
            - "{停留点1}"
            - "{停留点2}"

        # ===== 🎌 动漫专用 =====
        anime:

          action_sequence:          # 动作拆解（关键）
            - step: "{动作1}"
            - step: "{动作2}"
            - step: "{动作3}"

          vfx:                      # 特效（核心）
            - "{能量效果}"
            - "{环境变化}"
            - "{光影变化}"

          exaggeration:
            level: "low | medium | high"   # 夸张程度

          power_system:
            type: "{力量体系}"            # 如：灵力 / 魔法
            state: "{当前状态}"

          camera_emphasis:
            - "{镜头强调点}"

          emotion_style:
            type: "热血 | 压抑 | 爆发"
            intensity: "high"

        # ===== 🎬 电影专用 =====
        film:

          pacing:
            rhythm: "slow | medium | fast"   # 节奏控制

          visual_metaphor:
            - "{隐喻元素（如：雨/镜子）}"

          subtext:
            - "{潜台词}"

          silence_usage:
            - "{静默段落}"

          camera_style:
            movement: "static | slow_push | handheld"
            composition: "{构图风格}"

          lighting:
            style: "{光影风格}"

          color_palette:
            tone: "{整体色调}"

          realism_level:
            level: "high"